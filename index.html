<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cloudflare Tunnel Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main page section - Cockpit style wrapper -->
    <div class="pf-v6-c-page__main-section">
        
        <!-- Tunnel Status Card -->
        <div class="pf-v6-c-card">
            <div class="pf-v6-c-card__title">
                <h2 class="pf-v6-c-card__title-text">Cloudflare Tunnel Status</h2>
            </div>
            <div class="pf-v6-c-card__body">
                <div id="status">Loading...</div>
                <div style="margin: 12px 0; font-size: 13px; color: var(--pf-v6-global--Color--200, #6a6e73);">
                    <strong>Version:</strong> <span id="version-info">Checking...</span>
                </div>
                <div id="stats"></div>
                <div class="button-container">
                    <button class="pf-v6-c-button pf-m-primary" id="restart-btn">Restart Tunnel</button>
                    <button class="pf-v6-c-button pf-m-secondary" id="refresh-btn">Refresh</button>
                    <button class="pf-v6-c-button pf-m-success" id="update-btn">Update Cloudflared</button>
                </div>
            </div>
        </div>

        <!-- Traffic & Services Card -->
        <div class="pf-v6-c-card">
            <div class="pf-v6-c-card__title">
                <h2 class="pf-v6-c-card__title-text">Traffic &amp; Services</h2>
            </div>
            <div class="pf-v6-c-card__body">
                <div id="services">Loading...</div>
            </div>
        </div>

        <!-- Live Tunnel Logs Card -->
        <div class="pf-v6-c-card">
            <div class="pf-v6-c-card__title">
                <h2 class="pf-v6-c-card__title-text">Live Tunnel Logs</h2>
            </div>
            <div class="pf-v6-c-card__body">
                <button class="pf-v6-c-button pf-m-success pf-m-small" id="autoscroll-toggle">
                    Auto-scroll: ON
                </button>
                <div id="log-container"></div>
            </div>
        </div>

    </div>

    <!-- Load Cockpit JavaScript API -->
    <script src="../base1/cockpit.js"></script>
    <!-- Load application code after Cockpit API -->
    <script src="app.js"></script>
</body>
</html>
