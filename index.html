<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cloudflare Tunnel Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1>Cloudflare Tunnels</h1>
        <div class="app-header-meta">
            <span><strong>cloudflared:</strong> <span id="version-info">Checking...</span></span>
            <span class="app-header-actions">
                <button class="pf-v6-c-button pf-m-secondary pf-m-small" id="refresh-btn">Refresh All</button>
                <button class="pf-v6-c-button pf-m-success pf-m-small" id="update-btn">Update Cloudflared</button>
            </span>
        </div>
    </header>

    <nav class="tunnel-tabs" id="tunnel-tabs" aria-label="Tunnels">
        <!-- Tabs rendered by app.js -->
    </nav>

    <!-- Main page section - Cockpit style wrapper -->
    <div class="pf-v6-c-page__main-section">

        <!-- Per-tunnel cards + install form are rendered here by app.js -->
        <div id="tunnels">
            <div class="pf-v6-c-card">
                <div class="pf-v6-c-card__body">Discovering tunnels&hellip;</div>
            </div>
        </div>

    </div>

    <!-- Load Cockpit JavaScript API -->
    <script src="../base1/cockpit.js"></script>
    <!-- Discovery helper (populates window.tunnelDiscovery) -->
    <script src="discovery.js"></script>
    <!-- Load application code after Cockpit API and discovery -->
    <script src="app.js"></script>
</body>
</html>
