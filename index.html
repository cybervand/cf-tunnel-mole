<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cloudflare Tunnel Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main page section - Cockpit style wrapper -->
    <div class="pf-v6-c-page__main-section">

        <!-- Overview (applies to the shared cloudflared binary) -->
        <div class="pf-v6-c-card">
            <div class="pf-v6-c-card__title">
                <h2 class="pf-v6-c-card__title-text">Cloudflared Overview</h2>
            </div>
            <div class="pf-v6-c-card__body">
                <div style="margin: 0 0 12px 0; font-size: 13px; color: var(--pf-v6-global--Color--200, #6a6e73);">
                    <strong>Version:</strong> <span id="version-info">Checking...</span>
                </div>
                <div class="button-container">
                    <button class="pf-v6-c-button pf-m-secondary" id="refresh-btn">Refresh All</button>
                    <button class="pf-v6-c-button pf-m-success" id="update-btn">Update Cloudflared</button>
                </div>
            </div>
        </div>

        <!-- Per-tunnel cards are rendered here by app.js after discovery -->
        <div id="tunnels">
            <div class="pf-v6-c-card">
                <div class="pf-v6-c-card__body">Discovering tunnels&hellip;</div>
            </div>
        </div>

    </div>

    <!-- Load Cockpit JavaScript API -->
    <script src="../base1/cockpit.js"></script>
    <!-- Discovery helper (populates window.tunnelDiscovery) -->
    <script src="discovery.js"></script>
    <!-- Load application code after Cockpit API and discovery -->
    <script src="app.js"></script>
</body>
</html>
